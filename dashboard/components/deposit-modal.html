    <div class="modal-overlay absolute inset-0" onclick="hideDepositModal()"></div>
    <div class="absolute inset-x-4 top-[18%] max-w-[380px] mx-auto">
        <div class="glass rounded-2xl p-5 border border-white/10">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h3 class="text-lg font-bold text-white">Deposit Funds</h3>
                    <p class="text-xs text-white/45 mt-1">Follow the same TeleBirr deposit flow from the bot.</p>
                </div>
                <button onclick="hideDepositModal()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-white/70">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div id="depositStepOne" class="space-y-3">
                <div id="depositPendingInfo" class="glass rounded-xl p-3 text-center">
                    <div class="text-xs text-white/50">Pending Deposit Requests</div>
                    <div id="depositPendingCount" class="text-xl font-bold text-bingo-green">0 / 3</div>
                </div>
                <div>
                    <label class="text-xs text-white/50 uppercase mb-1 block">TeleBirr Full Name</label>
                    <input type="text" id="depositTelebirrName" placeholder="Name on TeleBirr account" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-bingo-green">
                </div>
                <div>
                    <label class="text-xs text-white/50 uppercase mb-1 block">Amount (ETB)</label>
                    <input type="number" id="depositAmount" placeholder="Enter amount" min="10" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-bingo-green">
                </div>
                <div class="flex gap-3 pt-1">
                    <button onclick="hideDepositModal()" class="flex-1 bg-white/10 text-white py-3 rounded-xl font-medium btn-hover">Cancel</button>
                    <button onclick="continueDepositStep()" class="flex-1 gradient-green py-3 rounded-xl font-medium btn-hover text-white">Next</button>

            </div>

            <div id="depositStepTwo" class="space-y-3 hidden">
                <div class="glass rounded-xl p-3 text-center">
                    <div class="text-xs text-white/50">Send This Amount</div>
                    <div id="depositSummaryAmount" class="text-xl font-bold text-bingo-green">0 ETB</div>
                </div>
                <div class="glass rounded-xl p-4 border border-bingo-teal/25">
                    <div class="text-xs text-white/50 uppercase mb-1">TeleBirr Number</div>
                    <div id="depositTargetPhone" class="text-lg font-bold text-bingo-teal">0911000000</div>
                    <p class="text-xs text-white/45 mt-2">Send the money first, then enter the transaction number from your receipt.</p>
                </div>
                <div>
                    <label class="text-xs text-white/50 uppercase mb-1 block">Transaction Number</label>
                    <input type="text" id="depositTransactionId" placeholder="Enter receipt transaction number" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-bingo-green">
                </div>
                <div class="flex gap-3 pt-1">
                    <button onclick="backDepositStep()" class="flex-1 bg-white/10 text-white py-3 rounded-xl font-medium btn-hover">Back</button>
                    <button onclick="submitDeposit()" class="flex-1 gradient-green py-3 rounded-xl font-medium btn-hover text-white">Submit</button>
                </div>
            </div>
        </div>
    </div>
